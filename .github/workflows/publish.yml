name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        type: string
        description: Tag to publish (e.g. v2.1.3)
        required: true

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Verify tag, version.go, and go.mod module path
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "Error: Tag is required."
            exit 1
          fi
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag '$TAG' does not exist."
            exit 1
          fi
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(grep 'const Version' version.go | sed -E 's/.*"(.*)".*/\1/')
          if [ -z "$PKG_VERSION" ]; then
            echo "Error: Could not read version from version.go"
            exit 1
          fi
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: version.go ($PKG_VERSION) does not match tag ($TAG)."
            exit 1
          fi
          MODULE=$(grep '^module ' go.mod | awk '{print $2}')
          MAJOR="${TAG_VERSION%%.*}"
          if [ "$MAJOR" -ge 2 ] 2>/dev/null; then
            EXPECTED="/v${MAJOR}"
            case "$MODULE" in
              *"${EXPECTED}") ;;
              *)
                echo "Error: go.mod module ($MODULE) must end with ${EXPECTED} for tag $TAG."
                exit 1
                ;;
            esac
          fi
          echo "Publishing tag: $TAG (github.com/zerobounce/zerobouncego/v2@${PKG_VERSION})"

  test:
    name: Test
    needs: [validate-tag]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test ./... -cover -short -v

  release:
    name: Create GitHub Release
    needs: [test]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes
          fi

  verify-proxy:
    name: Verify pkg.go.dev proxy
    needs: [release]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for proxy.golang.org to index tag
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          URL="https://proxy.golang.org/github.com/zerobounce/zerobouncego/v2/@v/${TAG}.info"
          echo "Checking $URL"
          for i in $(seq 1 20); do
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' "$URL" || true)
            if [ "$CODE" = "200" ]; then
              echo "Proxy indexed $TAG (attempt $i)."
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE — waiting 15s..."
            sleep 15
          done
          echo "Warning: proxy did not return 200 for $TAG within 5 minutes."
          echo "pkg.go.dev may still index shortly; verify manually:"
          echo "  go get github.com/zerobounce/zerobouncego/v2@${TAG#v}"
          exit 1
